name: Crawl and deploy

on:
  workflow_dispatch:
    inputs:
      run_enrichment:
        description: "Ejecutar piloto privado de enriquecimiento IA"
        required: true
        type: boolean
        default: false
      enrichment_promotions:
        description: "Máximo de promociones del piloto"
        required: true
        type: choice
        default: "2"
        options:
          - "1"
          - "2"
          - "3"
  schedule:
    - cron: "17 6 * * *"
      timezone: "Europe/Madrid"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    name: Crawl and build Pages artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install .NET from global.json
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore last private crawler state
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .runtime/state
          key: crawler-state-${{ github.run_id }}
          restore-keys: |
            crawler-state-

      - name: Restore
        run: dotnet restore SierraNueva.sln

      - name: Build crawler and web
        run: dotnet build SierraNueva.sln -c Release --no-restore

      - name: Validate live configuration
        run: >-
          dotnet run --project src/SierraNueva.Crawler -c Release --no-build --
          validate-config
          --config config/appsettings.live.json
          --sources config/sources.live.json
          --discovery-sources config/discovery-sources.live.json

      - name: Discover opportunities and update private coverage
        id: opportunity-radar
        continue-on-error: true
        run: >-
          dotnet run --project src/SierraNueva.Crawler -c Release --no-build --
          discover-opportunities
          --config config/appsettings.live.json
          --discovery-sources config/discovery-sources.live.json
          --sources config/sources.live.json
          --municipalities config/municipalities.json
          --state .runtime/state

      - name: Backfill the last 31 BOCM days weekly
        id: opportunity-backfill
        continue-on-error: true
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'schedule' -and
              (Get-Date).DayOfWeek -ne [DayOfWeek]::Monday) {
            'schedule=omitted-not-monday' |
              Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "Backfill semanal omitido: hoy no es lunes." |
              Write-Output
            exit 0
          }
          'schedule=executed' |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $to = (Get-Date).ToUniversalTime().Date
          $from = $to.AddDays(-30)
          $fromText = $from.ToString('yyyy-MM-dd')
          $toText = $to.ToString('yyyy-MM-dd')
          dotnet run --project src/SierraNueva.Crawler -c Release --no-build -- `
            backfill-opportunities `
            --config config/appsettings.live.json `
            --discovery-sources config/discovery-sources.live.json `
            --sources config/sources.live.json `
            --municipalities config/municipalities.json `
            --source bocm-calendar `
            --from $fromText `
            --to $toText `
            --state .runtime/state
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Create private opportunity audit sample
        id: opportunity-audit
        continue-on-error: true
        run: >-
          dotnet run --project src/SierraNueva.Crawler -c Release --no-build --
          audit-opportunities
          --municipalities config/municipalities.json
          --state .runtime/state
          --sample-size 10

      - name: Crawl reviewed live sources
        run: >-
          dotnet run --project src/SierraNueva.Crawler -c Release --no-build --
          crawl
          --config config/appsettings.live.json
          --sources config/sources.live.json
          --output .runtime/public
          --state .runtime/state
          --no-playwright

      - name: Validate live public data
        run: >-
          dotnet run --project src/SierraNueva.Crawler -c Release --no-build --
          validate-data
          --output .runtime/public

      - name: Run bounded private AI enrichment pilot
        id: promotion-enrichment
        continue-on-error: true
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.run_enrichment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: >-
          dotnet run --project src/SierraNueva.Crawler -c Release --no-build --
          enrich-promotions
          --config config/appsettings.live.json
          --sources config/sources.live.json
          --state .runtime/state
          --max-promotions ${{ inputs.enrichment_promotions }}
          --max-evidence-pages 3
          --max-evidence-chars 8000
          --max-output-tokens 800
          --max-cost-usd 0.05
          --model gpt-5.6-luna

      - name: Validate map coverage
        shell: pwsh
        run: |
          $dataset = Get-Content -Raw -LiteralPath .runtime/public/promotions.json |
            ConvertFrom-Json
          $geoJson = Get-Content -Raw -LiteralPath .runtime/public/promotions.geojson |
            ConvertFrom-Json
          $promotionCount = @($dataset.promotions).Count
          $featureCount = @($geoJson.features).Count
          if ($featureCount -ne $promotionCount) {
            throw "El mapa solo contiene $featureCount de $promotionCount promociones."
          }

      - name: Reject fixture data in the production artifact
        shell: pwsh
        run: |
          $dataset = Get-Content -Raw -LiteralPath .runtime/public/promotions.json
          if ($dataset.IndexOf('.test', [StringComparison]::OrdinalIgnoreCase) -ge 0) {
            throw 'El dataset live contiene una URL reservada .test.'
          }

      - name: Stage live public data for the web build
        shell: pwsh
        run: |
          Copy-Item -Path .runtime/public/* -Destination data/public -Force

      - name: Publish Blazor
        run: >-
          dotnet publish src/SierraNueva.Web/SierraNueva.Web.csproj
          -c Release
          --no-restore
          -o artifacts/publish

      - name: Prepare GitHub Pages subpath
        shell: pwsh
        run: >-
          ./scripts/prepare-pages.ps1
          -WebRoot artifacts/publish/wwwroot
          -BasePath /SierraNueva/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: artifacts/publish/wwwroot

      - name: Write crawl summary
        shell: pwsh
        env:
          RADAR_OUTCOME: ${{ steps.opportunity-radar.outcome }}
          BACKFILL_OUTCOME: ${{ steps.opportunity-backfill.outcome }}
          BACKFILL_SCHEDULE: ${{ steps.opportunity-backfill.outputs.schedule }}
          AUDIT_OUTCOME: ${{ steps.opportunity-audit.outcome }}
          ENRICHMENT_OUTCOME: ${{ steps.promotion-enrichment.outcome }}
        run: |
          $run = Get-Content -Raw -LiteralPath .runtime/public/run.json |
            ConvertFrom-Json
          $coveragePath = '.runtime/state/opportunity-candidates.json'
          if (Test-Path -LiteralPath $coveragePath) {
            $radar = Get-Content -Raw -LiteralPath $coveragePath |
              ConvertFrom-Json
            $coverage = $radar.coverage
            $radarSummary = @"
          - Ejecución del radar: $env:RADAR_OUTCOME
          - Backfill BOCM: $env:BACKFILL_OUTCOME ($env:BACKFILL_SCHEDULE)
          - Auditoría muestral privada: $env:AUDIT_OUTCOME
          - Piloto IA privado: $env:ENRICHMENT_OUTCOME
          - Radar: $($coverage.healthySources) fuentes sanas, $($coverage.degradedSources) degradadas y $($coverage.failingSources) en fallo reiterado
          - Cobertura radar: $($coverage.municipalitiesWithHealthyCoverage)/$($coverage.municipalitiesTotal) municipios; $($coverage.municipalitiesWithHealthyDirectSource) con canal directo
          - Candidatos privados pendientes: $($coverage.pendingCandidates)
          "@
          } else {
            $radarSummary = @"
          - Ejecución del radar: $env:RADAR_OUTCOME
          - Backfill BOCM: $env:BACKFILL_OUTCOME ($env:BACKFILL_SCHEDULE)
          - Auditoría muestral privada: $env:AUDIT_OUTCOME
          - Piloto IA privado: $env:ENRICHMENT_OUTCOME
          - Radar: sin estado disponible en esta ejecución
          "@
          }
          @"
          ## SierraNueva

          - Estado: $($run.status)
          - Promociones publicadas: $($run.quality.validPromotions)
          - Fuentes correctas: $($run.successfulSources)
          - Fuentes fallidas: $($run.failedSources)
          - Run ID: ``$($run.runId)``
          $radarSummary
          "@ | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
