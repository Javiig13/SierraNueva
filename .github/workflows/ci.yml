name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  verify:
    name: Baseline offline
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install .NET from global.json
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore SierraNueva.sln

      - name: Build Release
        run: dotnet build SierraNueva.sln -c Release --no-restore

      - name: Test
        run: dotnet test SierraNueva.sln -c Release --no-build

      - name: Verify formatting
        run: dotnet format SierraNueva.sln --verify-no-changes --no-restore

      - name: Validate configuration
        run: dotnet run --project src/SierraNueva.Crawler -c Release --no-build -- validate-config

      - name: Exercise opportunity radar with fixtures
        run: dotnet run --project src/SierraNueva.Crawler -c Release --no-build -- discover-opportunities --dry-run

      - name: Exercise crawler with fixtures
        run: dotnet run --project src/SierraNueva.Crawler -c Release --no-build -- crawl --no-playwright

      - name: Validate public data
        run: dotnet run --project src/SierraNueva.Crawler -c Release --no-build -- validate-data

      - name: Publish and verify static artifact
        run: dotnet publish src/SierraNueva.Web/SierraNueva.Web.csproj -c Release --no-restore
